# WatchLog — Nginx reverse proxy configuration
# Replace YOUR_DOMAIN with the actual domain before deploying.
# Cert paths assume Let's Encrypt via Certbot (docker compose --profile certbot).

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 50M;

    # Upstream: WatchLog FastAPI app
    upstream watchlog_app {
        server watchlog:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name YOUR_DOMAIN;

        # Certbot ACME challenge (webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name YOUR_DOMAIN;

        ssl_certificate     /etc/nginx/certs/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/YOUR_DOMAIN/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_prefer_server_ciphers off;

        # HSTS (enable once cert is confirmed valid)
        # add_header Strict-Transport-Security "max-age=63072000" always;

        # Proxy all traffic to WatchLog
        location / {
            proxy_pass         http://watchlog_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # Health check endpoint (no auth required)
        location /health {
            proxy_pass http://watchlog_app/health;
            access_log off;
        }
    }
}
