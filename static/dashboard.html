<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatchLog — AI CCTV 모니터링</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
    /* Login */
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
    .login-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:2.5rem;width:100%;max-width:400px}
    .logo{font-size:2rem;font-weight:800;color:#38bdf8;margin-bottom:.25rem}
    .logo span{color:#e2e8f0}
    .tagline{color:#94a3b8;font-size:.875rem;margin-bottom:2rem}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
    input,select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:.75rem 1rem;color:#e2e8f0;font-size:.9rem;outline:none;transition:border-color .2s}
    input:focus,select:focus{border-color:#38bdf8}
    .btn{width:100%;background:#0ea5e9;color:#fff;border:none;border-radius:8px;padding:.85rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s}
    .btn:hover{background:#0284c7}
    .btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}
    .err{background:#450a0a;border:1px solid #7f1d1d;border-radius:8px;padding:.75rem;color:#fca5a5;font-size:.85rem;margin-bottom:1rem}
    /* Header */
    .header{background:#1e293b;border-bottom:1px solid #334155;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .header-logo{font-size:1.25rem;font-weight:800;color:#38bdf8}
    .header-logo span{color:#e2e8f0}
    .header-right{display:flex;align-items:center;gap:.75rem}
    .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:.4rem;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .btn-sm{background:transparent;border:1px solid #334155;color:#94a3b8;border-radius:6px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;white-space:nowrap}
    .btn-sm:hover{border-color:#64748b;color:#e2e8f0}
    .btn-primary-sm{background:#0ea5e9;color:#fff;border:none;border-radius:6px;padding:.4rem .9rem;font-size:.8rem;font-weight:600;cursor:pointer}
    .btn-primary-sm:hover{background:#0284c7}
    /* Main layout */
    .main{padding:1.5rem 2rem;max-width:1200px;margin:0 auto}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
    .stat-card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:1.25rem}
    .stat-label{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
    .stat-val{font-size:1.75rem;font-weight:700}
    .green{color:#22c55e}.yellow{color:#fbbf24}.blue{color:#38bdf8}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
    @media(max-width:768px){.grid2{grid-template-columns:1fr}}
    .card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:1.5rem}
    .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
    .section-title{font-size:.85rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
    /* Camera list */
    .cam-item{display:flex;align-items:center;justify-content:space-between;background:#0f172a;border-radius:8px;padding:.75rem 1rem;margin-bottom:.5rem}
    .cam-name{font-weight:500;font-size:.9rem}
    .cam-sub{font-size:.75rem;color:#64748b;margin-top:.15rem}
    .badge{border-radius:20px;padding:.2rem .6rem;font-size:.72rem;font-weight:600}
    .badge-green{background:#14532d;color:#86efac}
    .badge-blue{background:#0c4a6e;color:#7dd3fc}
    .badge-gray{background:#1e293b;color:#94a3b8;border:1px solid #334155}
    /* Alert list */
    .alert-item{display:flex;gap:.75rem;background:#0f172a;border-radius:8px;padding:.75rem 1rem;margin-bottom:.5rem}
    .alert-icon{font-size:1.2rem;flex-shrink:0}
    .alert-desc{font-size:.875rem;font-weight:500}
    .alert-meta{font-size:.72rem;color:#64748b;margin-top:.15rem}
    .empty{text-align:center;color:#475569;padding:2rem;font-size:.875rem}
    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
    .modal{background:#1e293b;border:1px solid #334155;border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid #334155}
    .modal-title{font-size:1rem;font-weight:700}
    .close-btn{background:none;border:none;color:#64748b;cursor:pointer;font-size:1.25rem;line-height:1}
    .modal-body{padding:1.5rem}
    /* Tabs */
    .tabs{display:flex;gap:.5rem;margin-bottom:1.5rem}
    .tab{flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:.6rem;font-size:.82rem;font-weight:500;cursor:pointer;color:#94a3b8;text-align:center;transition:all .15s}
    .tab.active{background:#0c4a6e;border-color:#0ea5e9;color:#7dd3fc}
    .tab:hover:not(.active){border-color:#475569;color:#e2e8f0}
    /* Video preview */
    .video-wrap{background:#000;border-radius:8px;overflow:hidden;margin-bottom:1rem;position:relative;aspect-ratio:4/3}
    video{width:100%;height:100%;object-fit:cover}
    .video-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);font-size:.875rem;color:#94a3b8}
    .analysis-badge{position:absolute;top:.5rem;right:.5rem;border-radius:6px;padding:.25rem .6rem;font-size:.75rem;font-weight:700}
    .analysis-ok{background:#14532d;color:#86efac}
    .analysis-alert{background:#7f1d1d;color:#fca5a5;animation:pulse .5s infinite}
    /* Form helpers */
    .field{margin-bottom:1rem}
    .field label{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
    .row{display:flex;gap:.5rem}
    .row input,.row select{flex:1}
    .iphone-guide{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:1rem;font-size:.82rem;line-height:1.6;color:#94a3b8}
    .iphone-guide strong{color:#e2e8f0}
    .iphone-guide code{background:#1e293b;border-radius:4px;padding:.1rem .4rem;font-size:.8rem;color:#38bdf8}
    .qr-box{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:1rem;display:flex;flex-direction:column;align-items:center;gap:.75rem;margin-bottom:1rem}
    .qr-box canvas{border-radius:6px}
    .qr-label{font-size:.78rem;color:#94a3b8;text-align:center}
    .qr-url{font-size:.72rem;color:#38bdf8;word-break:break-all;text-align:center}
    .qr-divider{width:100%;border:none;border-top:1px solid #334155;margin:.25rem 0}
    .modal-footer{display:flex;gap:.5rem;justify-content:flex-end;padding:1rem 1.5rem;border-top:1px solid #334155}
    .btn-modal{border-radius:8px;padding:.6rem 1.25rem;font-size:.875rem;font-weight:600;cursor:pointer;border:none}
    .btn-cancel{background:transparent;border:1px solid #334155;color:#94a3b8}
    .btn-cancel:hover{border-color:#64748b;color:#e2e8f0}
    .btn-confirm{background:#0ea5e9;color:#fff}
    .btn-confirm:hover{background:#0284c7}
    .btn-confirm:disabled{background:#334155;color:#64748b;cursor:not-allowed}
    canvas{display:none}
    /* Screen share */
    .screen-wrap{background:#000;border-radius:8px;overflow:hidden;margin-bottom:1rem;position:relative;aspect-ratio:16/9}
    .screen-wrap video{width:100%;height:100%;object-fit:contain}
    .screen-desc{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:.75rem 1rem;font-size:.875rem;color:#e2e8f0;line-height:1.5;min-height:3rem}
    .timeline-item{display:flex;gap:.75rem;background:#0f172a;border-radius:8px;padding:.6rem 1rem;margin-bottom:.4rem;align-items:flex-start}
    .timeline-time{font-size:.72rem;color:#64748b;white-space:nowrap;padding-top:.15rem;flex-shrink:0}
    .timeline-text{font-size:.82rem;color:#e2e8f0;line-height:1.5}
    .btn-screen{background:#7c3aed;color:#fff;border:none;border-radius:6px;padding:.4rem .9rem;font-size:.8rem;font-weight:600;cursor:pointer}
    .btn-screen:hover{background:#6d28d9}
    .btn-screen-stop{background:#7f1d1d;color:#fca5a5;border:none;border-radius:6px;padding:.4rem .9rem;font-size:.8rem;font-weight:600;cursor:pointer}
    .btn-screen-stop:hover{background:#991b1b}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── API helpers ─────────────────────────────────────── */
async function apiFetch(path, opts = {}, token = null) {
  const headers = {};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  if (!(opts.body instanceof FormData)) headers['Content-Type'] = 'application/json';
  const res = await fetch(path, { ...opts, headers: { ...headers, ...(opts.headers || {}) } });
  if (!res.ok) { const t = await res.text(); throw new Error(`${res.status}: ${t}`); }
  return res.json();
}

async function postFrame(cameraId, blob, token) {
  const fd = new FormData();
  fd.append('camera_id', String(cameraId));
  fd.append('frame', blob, 'frame.jpg');
  const headers = {};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch('/cameras/frame', { method: 'POST', headers, body: fd });
  if (!res.ok) return null;
  return res.json();
}

/* ── Login ───────────────────────────────────────────── */
function LoginPage({ onLogin }) {
  const [key, setKey] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const submit = async (e) => {
    e.preventDefault();
    if (!key.trim()) return;
    setLoading(true); setErr('');
    try {
      const d = await apiFetch('/api/auth/token', { method: 'POST', body: JSON.stringify({ api_key: key.trim() }) });
      onLogin(d.access_token);
    } catch { setErr('API 키가 올바르지 않습니다.'); }
    finally { setLoading(false); }
  };
  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="logo">Watch<span>Log</span></div>
        <div className="tagline">AI 기반 CCTV 이상 감지 플랫폼</div>
        {err && <div className="err">{err}</div>}
        <form onSubmit={submit}>
          <div className="form-group"><label>API 키</label>
            <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="API 키 입력" autoFocus />
          </div>
          <button className="btn" disabled={loading||!key.trim()}>{loading?'인증 중…':'로그인'}</button>
        </form>
      </div>
    </div>
  );
}

/* ── iPhone QR Code ──────────────────────────────────── */
const MOBILE_CAM_URL = 'https://watchlog-production-2507.up.railway.app/mobile-camera';

function IphoneQRCode() {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || typeof QRCode === 'undefined') return;
    QRCode.toCanvas(canvasRef.current, MOBILE_CAM_URL, {
      width: 180,
      color: { dark: '#0f172a', light: '#e2e8f0' },
      errorCorrectionLevel: 'M',
    }).catch(() => {});
  }, []);
  return (
    <div className="qr-box">
      <div className="qr-label">📱 아이폰 사파리로 직접 스캔</div>
      <canvas ref={canvasRef} />
      <div className="qr-url">{MOBILE_CAM_URL}</div>
      <div className="qr-label" style={{fontSize:'.72rem',color:'#64748b'}}>
        QR 코드를 스캔하면 아이폰에서 바로 카메라 AI 분석을 시작할 수 있습니다
      </div>
    </div>
  );
}

/* ── Add Camera Modal ────────────────────────────────── */
function AddCameraModal({ token, onClose, onAdded }) {
  const [tab, setTab] = useState('webcam'); // webcam | iphone | rtsp
  const [devices, setDevices] = useState([]);
  const [deviceId, setDeviceId] = useState('');
  const [stream, setStream] = useState(null);
  const [camName, setCamName] = useState('');
  const [rtspUrl, setRtspUrl] = useState('');
  const [rtspName, setRtspName] = useState('');
  const [rtspLoc, setRtspLoc] = useState('');
  const [iphoneUrl, setIphoneUrl] = useState('');
  const [iphoneName, setIphoneName] = useState('');
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const [permDenied, setPermDenied] = useState(false);
  const videoRef = useRef(null);

  // ── 카메라 초기화 (권한 요청 → 스트림 즉시 연결) ──────────────
  useEffect(() => {
    if (tab !== 'webcam') { stopStream(); return; }
    let cancelled = false;
    (async () => {
      try {
        const s = await navigator.mediaDevices.getUserMedia({ video: true });
        if (cancelled) { s.getTracks().forEach(t => t.stop()); return; }
        setStream(s);
        setErr('');
        if (videoRef.current) { videoRef.current.srcObject = s; videoRef.current.play().catch(()=>{}); }
        const devs = await navigator.mediaDevices.enumerateDevices();
        const cams = devs.filter(d => d.kind === 'videoinput');
        setDevices(cams);
        const tid = s.getVideoTracks()[0]?.getSettings?.()?.deviceId || cams[0]?.deviceId || '';
        setDeviceId(tid);
      } catch(e) {
        if (!cancelled) setErr(e.name === 'NotAllowedError' ? 'PERMISSION_DENIED' : e.name === 'NotFoundError' ? '카메라를 찾을 수 없습니다.' : `카메라 오류: ${e.message}`);
      }
    })();
    return () => { cancelled = true; stopStream(); };
  }, [tab]);

  // 카메라 전환 (다른 deviceId 선택 시)
  useEffect(() => {
    if (tab !== 'webcam' || !deviceId || !stream) return;
    const currentId = stream.getVideoTracks()[0]?.getSettings?.()?.deviceId;
    if (currentId === deviceId) return;
    startStream(deviceId);
  }, [deviceId]);

  const startStream = async (id) => {
    stopStream();
    try {
      const s = await navigator.mediaDevices.getUserMedia(id ? { video: { deviceId: { exact: id } } } : { video: true });
      setStream(s); setErr('');
      if (videoRef.current) { videoRef.current.srcObject = s; videoRef.current.play().catch(()=>{}); }
    } catch(e) { setErr(e.name === 'NotAllowedError' ? 'PERMISSION_DENIED' : e.name === 'NotFoundError' ? '카메라를 찾을 수 없습니다.' : `오류: ${e.message}`); }
  };

  const stopStream = () => setStream(s => { s?.getTracks().forEach(t => t.stop()); return null; });

    const canSave = () => {
    if (tab === 'webcam') return camName.trim() && stream;
    if (tab === 'iphone') return iphoneName.trim() && iphoneUrl.trim();
    return rtspName.trim() && rtspUrl.trim();
  };

  const save = async () => {
    setErr(''); setSaving(true);
    try {
      let body;
      if (tab === 'webcam') body = { name: camName.trim(), rtsp_url: `browser://webcam/${deviceId.slice(0,16) || Date.now()}`, location: '브라우저 웹캠' };
      else if (tab === 'iphone') body = { name: iphoneName.trim(), rtsp_url: iphoneUrl.trim(), location: 'iPhone' };
      else body = { name: rtspName.trim(), rtsp_url: rtspUrl.trim(), location: rtspLoc.trim() || null };

      const cam = await apiFetch('/cameras', { method: 'POST', body: JSON.stringify(body) }, token);
      stopStream();
      onAdded(cam, tab === 'webcam' ? deviceId : null);
    } catch (e) {
      const msg = String(e);
      if (msg.includes('500')) {
        // 중복 등록 → 기존 카메라 재사용
        try {
          const existing = await apiFetch('/cameras', {}, token);
          const match = existing.find(c => c.location === '브라우저 웹캠');
          if (match) { stopStream(); onAdded(match, deviceId || null); return; }
        } catch(_) {}
      }
      setErr(msg);
    }
    finally { setSaving(false); }
  };

  return (
    <div className="overlay" onClick={e => { if (e.target===e.currentTarget){stopStream();onClose();} }}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">카메라 추가</span>
          <button className="close-btn" onClick={()=>{stopStream();onClose();}}>✕</button>
        </div>
        <div className="modal-body">
          <div className="tabs">
            <button className={`tab${tab==='webcam'?' active':''}`} onClick={()=>setTab('webcam')}>💻 웹캠/맥북</button>
            <button className={`tab${tab==='iphone'?' active':''}`} onClick={()=>setTab('iphone')}>📱 아이폰</button>
            <button className={`tab${tab==='rtsp'?' active':''}`} onClick={()=>setTab('rtsp')}>📷 RTSP IP카메라</button>
          </div>
          {err && <div className="err" style={{marginBottom:'1rem'}}>{err}</div>}

          {/* WEBCAM TAB */}
          {tab === 'webcam' && (
            <>
              <div className="video-wrap">
                <video ref={videoRef} autoPlay muted playsInline />
                {!stream && !permDenied && <div className="video-overlay">📷 카메라 권한을 요청 중입니다…<br/>브라우저 팝업에서 <strong>허용</strong>을 클릭해주세요</div>}
                {permDenied && (
                  <div className="video-overlay" style={{padding:'1.2rem',textAlign:'center',lineHeight:'1.7'}}>
                    <div style={{fontSize:'2rem',marginBottom:'.5rem'}}>🔒</div>
                    <div style={{color:'#f87171',fontWeight:'bold',marginBottom:'.8rem'}}>카메라 권한이 차단되어 있습니다</div>
                    <div style={{color:'#94a3b8',fontSize:'.8rem',textAlign:'left',display:'inline-block'}}>
                      <strong>Chrome 권한 재설정 방법:</strong><br/>
                      ① 주소창 왼쪽 🔒 아이콘 클릭<br/>
                      ② <em>"이 사이트의 권한"</em> → 카메라 → <strong>허용</strong>으로 변경<br/>
                      ③ 아래 버튼 클릭
                    </div>
                    <br/><br/>
                    <div style={{display:'flex',gap:'.6rem',justifyContent:'center',flexWrap:'wrap'}}>
                      <button onClick={() => startStream(deviceId)}
                        style={{background:'#3b82f6',color:'#fff',border:'none',borderRadius:'6px',padding:'.5rem 1.2rem',cursor:'pointer',fontSize:'.85rem',fontWeight:600}}>
                        🔄 카메라 다시 시도
                      </button>
                      <button onClick={() => window.location.reload()}
                        style={{background:'#475569',color:'#fff',border:'none',borderRadius:'6px',padding:'.5rem 1rem',cursor:'pointer',fontSize:'.85rem'}}>
                        페이지 새로고침
                      </button>
                    </div>
                    <div style={{marginTop:'.75rem',fontSize:'.75rem',color:'#64748b'}}>
                      또는 주소창에 직접 입력: <code style={{color:'#94a3b8'}}>chrome://settings/content/camera</code>
                    </div>
                  </div>
                )}
              </div>
              {devices.length > 1 && (
                <div className="field">
                  <label>카메라 선택</label>
                  <select value={deviceId} onChange={e=>setDeviceId(e.target.value)}>
                    {devices.map(d => <option key={d.deviceId} value={d.deviceId}>{d.label||`카메라 ${d.deviceId.slice(0,8)}`}</option>)}
                  </select>
                </div>
              )}
              <div className="field">
                <label>카메라 이름</label>
                <input value={camName} onChange={e=>setCamName(e.target.value)} placeholder="예: 내 맥북 카메라" />
              </div>
            </>
          )}

          {/* IPHONE TAB */}
          {tab === 'iphone' && (
            <>
              <IphoneQRCode />
              <hr className="qr-divider" style={{marginBottom:'1rem'}} />
              <div className="iphone-guide" style={{marginBottom:'1rem'}}>
                <strong>RTSP 앱으로 연결 (선택)</strong><br/><br/>
                1. 아이폰과 이 기기를 <strong>같은 WiFi</strong>에 연결<br/>
                2. 아이폰에서 아래 앱 중 하나를 설치하고 실행:<br/>
                &nbsp;&nbsp;• <strong>iVCam</strong> — RTSP URL: <code>rtsp://[iPhone-IP]:8554/live</code><br/>
                &nbsp;&nbsp;• <strong>Camo</strong> — RTSP URL: <code>rtsp://[iPhone-IP]:8080/live</code><br/>
                3. 아이폰 IP 확인 (설정 → WiFi → 연결된 네트워크 → IP 주소)
              </div>
              <div className="field"><label>카메라 이름</label>

              </div>

                <input value={iphoneUrl} onChange={e=>setIphoneUrl(e.target.value)} placeholder="rtsp://192.168.1.x:8554/live" />

      </div>
    </div>
  );
}

/* ── Webcam Analyzer (frame loop) ────────────────────── */
function WebcamAnalyzer({ camera, deviceId, token, onAlert }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const loopRef = useRef(null);
  const recognitionRef = useRef(null);
  const [status, setStatus] = useState('connecting');
  const [feed, setFeed] = useState([]);
  const feedRef = useRef(null);

  const addFeed = (type, text, isAlert = false) => {
    const now = new Date();
    const t = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    setFeed(prev => [...prev.slice(-80), { id: Date.now() + Math.random(), time: t, type, text, alert: isAlert }]);
  };

  useEffect(() => {
    if (feedRef.current) feedRef.current.scrollTop = feedRef.current.scrollHeight;
  }, [feed]);

  // ── 카메라 + AI 분석 루프 ──────────────────────────────
  useEffect(() => {
    let stream;
    (async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: deviceId } }, audio: false });
        if (videoRef.current) { videoRef.current.srcObject = stream; videoRef.current.play(); }
        setStatus('live');
        addFeed('system', '카메라 연결됨. AI 분석 시작합니다...');

        loopRef.current = setInterval(async () => {
          if (!canvasRef.current || !videoRef.current) return;
          const ctx = canvasRef.current.getContext('2d');
          canvasRef.current.width = videoRef.current.videoWidth || 640;
          canvasRef.current.height = videoRef.current.videoHeight || 480;
          ctx.drawImage(videoRef.current, 0, 0);
          canvasRef.current.toBlob(async blob => {
            if (!blob) return;
            try {
              const r = await postFrame(camera.id, blob, token);
              if (!r) return;
              const desc = r.description || r.alert_reason || (r.should_alert ? '이상 감지' : '정상');
              addFeed('vision', desc, r.should_alert);
              if (r.should_alert) onAlert({ ...r, camera_name: camera.name, detected_at: new Date().toISOString() });
            } catch(e) { /* 무시 */ }
          }, 'image/jpeg', 0.75);
        }, 3000);
      } catch(e) { setStatus('error'); addFeed('system', `카메라 오류: ${e.message}`, true); }
    })();
    return () => { stream?.getTracks().forEach(t => t.stop()); clearInterval(loopRef.current); };
  }, [camera.id, deviceId, token]);

  // ── 음성 인식 (Web Speech API) ──────────────────────
  useEffect(() => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      addFeed('audio', '이 브라우저는 음성인식을 지원하지 않습니다.');
      return;
    }
    const rec = new SpeechRecognition();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = 'ko-KR';
    rec.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const transcript = e.results[i][0].transcript.trim();
        if (e.results[i].isFinal && transcript) {
          addFeed('audio', `🔊 "${transcript}"`);
        }
      }
    };
    rec.onerror = (e) => {
      if (e.error !== 'no-speech') addFeed('audio', `음성인식 오류: ${e.error}`);
    };
    rec.onend = () => { try { rec.start(); } catch(e) {} }; // 자동 재시작
    try { rec.start(); recognitionRef.current = rec; }
    catch(e) { addFeed('audio', '마이크 권한이 필요합니다.'); }
    return () => { try { rec.stop(); } catch(e) {} };
  }, []);

  return (
    <div style={{background:'#0f172a',borderRadius:'12px',overflow:'hidden',border:'1px solid #1e293b'}}>
      {/* 헤더 */}
      <div style={{padding:'.6rem 1rem',display:'flex',alignItems:'center',gap:'.6rem',background:'#1e293b'}}>
        <span style={{fontWeight:600,color:'#e2e8f0'}}>{camera.name}</span>
        <span style={{fontSize:'.72rem',color:'#64748b'}}>3초 AI 분석 · 실시간 음성인식</span>
        <span style={{marginLeft:'auto',fontSize:'.72rem',padding:'.2rem .6rem',borderRadius:'999px',
          background: status==='live' ? '#14532d' : '#450a0a',
          color: status==='live' ? '#4ade80' : '#f87171'}}>
          {status === 'live' ? '● LIVE' : status === 'connecting' ? '연결 중...' : '오류'}
        </span>
      </div>

      {/* 메인 영역 */}
      <div style={{display:'flex',height:'440px'}}>
        {/* 비디오 (65%) */}
        <div style={{flex:'0 0 58%',position:'relative',background:'#000'}}>
          <video ref={videoRef} autoPlay muted playsInline
            style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
          <canvas ref={canvasRef} style={{display:'none'}}/>
          {/* 비디오 위 오버레이 레이블 */}
          <div style={{position:'absolute',bottom:'8px',left:'8px',
            background:'rgba(0,0,0,.6)',borderRadius:'4px',padding:'.2rem .5rem',
            fontSize:'.7rem',color:'#94a3b8'}}>
            📹 {camera.name}
          </div>
        </div>

        {/* AI 분석 피드 (35%) */}
        <div style={{flex:'1',display:'flex',flexDirection:'column',borderLeft:'1px solid #1e293b'}}>
          {/* 탭 헤더 */}
          <div style={{padding:'.4rem .7rem',borderBottom:'1px solid #1e293b',
            display:'flex',gap:'.5rem',background:'#0f172a'}}>
            <span style={{fontSize:'.7rem',color:'#60a5fa',fontWeight:600}}>📡 실시간 분석 피드</span>
            <span style={{marginLeft:'auto',fontSize:'.65rem',color:'#334155'}}>{feed.length}개</span>
          </div>

          {/* 피드 */}
          <div ref={feedRef} style={{flex:1,overflowY:'auto',padding:'.4rem .5rem',
            display:'flex',flexDirection:'column',gap:'.3rem',
            scrollbarWidth:'thin',scrollbarColor:'#1e293b #0f172a'}}>
            {feed.length === 0 && (
              <div style={{color:'#334155',fontSize:'.72rem',textAlign:'center',paddingTop:'2rem'}}>
                분석 시작 대기 중...
              </div>
            )}
            {feed.map(item => (
              <div key={item.id} style={{
                fontSize:'.72rem',lineHeight:'1.5',
                padding:'.3rem .45rem',borderRadius:'5px',
                background: item.alert ? 'rgba(239,68,68,0.08)' :
                  item.type === 'audio' ? 'rgba(139,92,246,0.08)' :
                  item.type === 'system' ? 'rgba(30,41,59,0.5)' : 'rgba(30,41,59,0.8)',
                borderLeft: `2px solid ${
                  item.alert ? '#ef4444' :
                  item.type === 'audio' ? '#8b5cf6' :
                  item.type === 'system' ? '#334155' : '#1d4ed8'
                }`
              }}>
                <span style={{color:'#475569',marginRight:'.35rem',fontSize:'.65rem'}}>{item.time}</span>
                {item.type === 'vision' && <span style={{color:'#60a5fa',marginRight:'.3rem',fontSize:'.65rem'}}>👁</span>}
                {item.type === 'audio' && <span style={{color:'#a78bfa',marginRight:'.3rem',fontSize:'.65rem'}}>🔊</span>}
                {item.alert && <span style={{color:'#ef4444',marginRight:'.25rem'}}>⚠</span>}
                <span style={{color: item.alert ? '#fca5a5' : item.type === 'audio' ? '#c4b5fd' : '#94a3b8'}}>
                  {item.text}
                </span>
              </div>
            ))}
          </div>

          {/* 범례 */}
          <div style={{padding:'.35rem .6rem',borderTop:'1px solid #1e293b',
            display:'flex',gap:'.8rem',fontSize:'.65rem',color:'#475569'}}>
            <span><span style={{color:'#60a5fa'}}>👁</span> 화면분석</span>
            <span><span style={{color:'#a78bfa'}}>🔊</span> 음성인식</span>
            <span><span style={{color:'#ef4444'}}>⚠</span> 이상감지</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function ScreenMonitor({ token, onClose }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const loopRef = useRef(null);
  const [stream, setStream] = useState(null);
  const [status, setStatus] = useState('idle'); // idle | live | error
  const [currentDesc, setCurrentDesc] = useState('');
  const [timeline, setTimeline] = useState([]);
  const [analyzing, setAnalyzing] = useState(false);

  const loadTimeline = async () => {
    try {
      const items = await apiFetch('/api/analysis/timeline?limit=20', {}, token);
      setTimeline(items);
    } catch {}
  };

  useEffect(() => { loadTimeline(); }, []);

  const startCapture = async () => {
    try {
      const s = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
      setStream(s);
      if (videoRef.current) videoRef.current.srcObject = s;
      setStatus('live');
      s.getVideoTracks()[0].onended = () => stopCapture();

      loopRef.current = setInterval(async () => {
        if (!videoRef.current || !canvasRef.current) return;
        const v = videoRef.current;
        const c = canvasRef.current;
        c.width = v.videoWidth || 1280; c.height = v.videoHeight || 720;
        c.getContext('2d').drawImage(v, 0, 0);
        const b64 = c.toDataURL('image/jpeg', 0.6).split(',')[1];
        if (!b64) return;
        setAnalyzing(true);
        try {
          const res = await fetch('/api/analysis/screen-frame', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}) },
            body: JSON.stringify({ frame_b64: b64 }),
          });
          if (res.ok) {
            const data = await res.json();
            setCurrentDesc(data.description);
            setTimeline(t => [data, ...t].slice(0, 50));
          }
        } catch {}
        finally { setAnalyzing(false); }
      }, 5000);
    } catch (e) {
      if (e.name !== 'NotAllowedError') setStatus('error');
    }
  };

  const stopCapture = () => {
    clearInterval(loopRef.current);
    setStream(s => { s?.getTracks().forEach(t => t.stop()); return null; });
    setStatus('idle');
  };

  useEffect(() => () => { clearInterval(loopRef.current); stream?.getTracks().forEach(t=>t.stop()); }, []);

  return (
    <div className="card" style={{marginBottom:'1.5rem'}}>
      <div className="card-header">
        <div className="section-title">🖥️ 화면 공유 AI 모니터링</div>
        <div style={{display:'flex',gap:'.5rem',alignItems:'center'}}>
          {analyzing && <span style={{fontSize:'.75rem',color:'#94a3b8'}}>분석 중…</span>}
          {status !== 'live'
            ? <button className="btn-screen" onClick={startCapture}>▶ 화면 공유 시작</button>
            : <button className="btn-screen-stop" onClick={stopCapture}>■ 중지</button>}
          <button className="btn-sm" onClick={onClose}>✕</button>
        </div>
      </div>

      {status === 'live' && (
        <div className="screen-wrap"><video ref={videoRef} autoPlay muted playsInline /></div>
      )}
      <canvas ref={canvasRef} style={{display:'none'}} />

      {currentDesc && (
        <div style={{marginBottom:'1rem'}}>
          <div style={{fontSize:'.75rem',color:'#64748b',marginBottom:'.4rem',textTransform:'uppercase',letterSpacing:'.05em'}}>현재 화면 분석</div>
          <div className="screen-desc">{currentDesc}</div>
        </div>
      )}

      <div>
        <div style={{fontSize:'.75rem',color:'#64748b',marginBottom:'.5rem',textTransform:'uppercase',letterSpacing:'.05em'}}>분석 타임라인</div>
        {timeline.length === 0
          ? <div className="empty" style={{padding:'1.5rem'}}>아직 분석 기록이 없습니다. 화면 공유를 시작하면 5초마다 AI가 분석합니다.</div>
          : timeline.map((item, i) => (
              <div key={item.id||i} className="timeline-item">
                <div className="timeline-time">{new Date(item.captured_at).toLocaleTimeString('ko-KR')}</div>
                <div className="timeline-text">{item.description}</div>
              </div>
            ))
        }
      </div>
    </div>
  );
}

/* ── Main Dashboard ──────────────────────────────────── */
function Dashboard({ token, onLogout }) {
  const [cameras, setCameras] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [showScreen, setShowScreen] = useState(false);
  const [webcams, setWebcams] = useState([]); // {camera, deviceId}
  const [liveCamera, setLiveCamera] = useState(null); // 라이브 뷰 모달용 {camera, deviceId}
  const chartRef = useRef(null);
  const chartInst = useRef(null);

  const load = async () => {
    try {
      const [cams, alts] = await Promise.all([
        apiFetch('/cameras', {}, token),
        apiFetch('/alerts', {}, token),
      ]);
      setCameras(cams);
      setAlerts(alts);
    } catch {}
    setLoading(false);
  };

  useEffect(() => { load(); const t = setInterval(load, 30000); return ()=>clearInterval(t); }, []);

  useEffect(() => {
    if (!chartRef.current) return;
    chartInst.current?.destroy();
    const days = [], counts = [];
    for (let i=6;i>=0;i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      days.push(`${d.getMonth()+1}/${d.getDate()}`);
      counts.push(alerts.filter(a=>{
        const ad=new Date(a.detected_at||0); return ad.toDateString()===d.toDateString();
      }).length);
    }
    chartInst.current = new Chart(chartRef.current, {
      type:'bar',
      data:{ labels:days, datasets:[{label:'이상 감지',data:counts,backgroundColor:'#0ea5e9',borderRadius:4}] },
      options:{ responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{grid:{color:'#1e293b'},ticks:{color:'#64748b'}},y:{grid:{color:'#1e293b'},ticks:{color:'#64748b',stepSize:1}}} }
    });
  }, [alerts]);

  const handleAdded = (cam, devId) => {
    load();
    setShowModal(false);
    if (devId) setWebcams(w => [...w, { camera: cam, deviceId: devId }]);
  };

  const handleWebcamAlert = (alertData) => {
    setAlerts(a => [alertData, ...a].slice(0, 100));
  };

  const todayAlerts = alerts.filter(a => new Date(a.detected_at||0).toDateString()===new Date().toDateString());
  const regularCameras = cameras.filter(c => !webcams.some(w=>w.camera.id===c.id));

  return (
    <>
      <div className="header">
        <div className="header-logo">Watch<span>Log</span></div>
        <div className="header-right">
          <span style={{fontSize:'.8rem',color:'#94a3b8'}}><span className="dot"/>운영 중</span>
          <button className="btn-screen" onClick={()=>setShowScreen(s=>!s)}>🖥️ 화면 공유</button>
          <button className="btn-primary-sm" onClick={()=>setShowModal(true)}>+ 카메라 추가</button>
          <a href="/docs" target="_blank" style={{textDecoration:'none'}}><button className="btn-sm">API 문서</button></a>

      </div>
      <div className="main">
        {loading ? <div style={{textAlign:'center',color:'#475569',padding:'3rem'}}>불러오는 중…</div> : (<>
          <div className="stats-grid">
            <div className="stat-card"><div className="stat-label">등록 카메라</div><div className="stat-val blue">{cameras.length}</div></div>
            <div className="stat-card"><div className="stat-label">웹캠 활성</div><div className="stat-val green">{webcams.length}</div></div>
            <div className="stat-card"><div className="stat-label">오늘 알림</div><div className="stat-val yellow">{todayAlerts.length}</div></div>
            <div className="stat-card"><div className="stat-label">전체 알림</div><div className="stat-val">{alerts.length}</div></div>

            <div style={{padding:'.8rem 1.2rem',display:'flex',alignItems:'center',gap:'1rem',background:'#1e293b',borderBottom:'1px solid #334155'}}>

                    <div style={{fontSize:'3rem',marginBottom:'1rem'}}>📷</div>
                    <div style={{fontWeight:600,marginBottom:'.5rem'}}>카메라 권한이 필요합니다</div>
                    <div style={{fontSize:'.875rem'}}>브라우저에서 카메라 접근을 허용해주세요</div>
                    <button style={{marginTop:'1rem',padding:'.6rem 1.5rem',background:'#3b82f6',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer',fontWeight:600}}
                      onClick={()=>{
                        navigator.mediaDevices.getUserMedia({video:true})
                          .then(s=>{const id=s.getVideoTracks()[0]?.getSettings?.()?.deviceId||'';s.getTracks().forEach(t=>t.stop());setLiveCamera(lv=>({...lv,deviceId:id}));})
                          .catch(()=>{});
                      }}>카메라 권한 허용</button>
                  </div>
              }
            </div>
          </div>
        </div>
      )}
      {showModal && <AddCameraModal token={token} onClose={()=>setShowModal(false)} onAdded={handleAdded} />}
    </>
  );
}

/* ── App root ────────────────────────────────────────── */
function App() {
  const [token, setToken] = useState(() => localStorage.getItem('wl_token'));
  const login = t => { setToken(t); localStorage.setItem('wl_token', t); };
  const logout = () => { setToken(null); localStorage.removeItem('wl_token'); };
  return token ? <Dashboard token={token} onLogout={logout} /> : <LoginPage onLogin={login} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
