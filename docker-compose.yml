version: "3.9"

# WatchLog — Production Docker Compose
# Usage:
#   1. cp .env.example .env && vi .env
#   2. docker compose up -d
#   3. HTTPS cert: place cert.pem / key.pem under ./nginx/certs/ or use Certbot (see README)

services:
  watchlog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watchlog_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - watchlog_clips:/app/clips
      - watchlog_db:/app/data
      - watchlog_models:/app/models
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    container_name: watchlog_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      # Certbot webroot (for Let's Encrypt renewal)
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - internal
    depends_on:
      watchlog:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # Optional: Certbot for automatic Let's Encrypt cert renewal
  certbot:
    image: certbot/certbot:latest
    container_name: watchlog_certbot
    profiles: ["certbot"]
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"

volumes:
  watchlog_clips:
  watchlog_db:
  watchlog_models:
  certbot_webroot:

networks:
  internal:
    driver: bridge
